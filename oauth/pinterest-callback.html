<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pinterest OAuth Callback — VaultDigitals</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #fbf8f3;
    color: #1a1a1a;
    max-width: 760px;
    margin: 3rem auto;
    padding: 2rem;
    line-height: 1.7;
  }
  h1 { color: #0d2b4d; }
  .row { background: #fff; border: 1px solid #ddd; border-radius: 6px;
         padding: 12px 18px; margin: 12px 0; }
  .label { color: #5a5a5a; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; }
  code { background: #f0ebe0; padding: 4px 8px; border-radius: 4px; word-break: break-all;
         display: block; margin-top: 6px; font-size: 13px; }
  .note { color: #5a5a5a; margin-top: 24px; font-size: 14px; }
</style>
</head>
<body>
<h1>Pinterest OAuth — code received</h1>
<p>If you reached this page, the Pinterest authorization completed successfully.
Copy the <strong>code</strong> below and paste it into your terminal:</p>

<div class="row">
  <div class="label">Code</div>
  <code id="code">(loading…)</code>
</div>
<div class="row">
  <div class="label">State</div>
  <code id="state">(loading…)</code>
</div>

<p class="note">Run:
<code>python3 scripts/pinterest_auth.py finish &lt;the_code_above&gt;</code></p>

<script>
  const params = new URLSearchParams(window.location.search);
  document.getElementById('code').textContent = params.get('code') || '(no code in URL)';
  document.getElementById('state').textContent = params.get('state') || '(no state in URL)';
</script>
</body>
</html>
